<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Validación - Sanatorio Allende</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#eaf4ff,#d8e8f8);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:650px;
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.15);
border:1px solid #dce7f3;
}
width:100%;
max-width:550px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
.header{
background:linear-gradient(135deg,#4c86bd,#2f6ca5);
padding:40px;
text-align:center;
}padding:30px;
text-align:center;
}

.header img{
max-width:320px;
width:100%;
}

.contenido{
padding:35px;
}

h1{
text-align:center;
color:#1f3d5c;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:18px;
}

transition:.3s;
font-weight:bold;
letter-spacing:.5px;
width:100%;
margin-top:15px;
padding:15px;
border:none;
background:#4c86bd;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.ok{
background:#e8f8ec;
border-left:6px solid #28a745;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.error{
background:#fdeaea;
border-left:6px solid #dc3545;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.ok h2{
color:#28a745;
}

.error h2{
color:#dc3545;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<img src="LOGO ALLENDE.jpg">

<div class="contenido">

<h1>Portal de Validación</h1>

<p class="sub">
Verificación de asistencia en Guardia
</p>

<input type="text" id="dni" placeholder="Ingrese DNI">

<button onclick="buscar()">
Validar Asistencia
</button>

<div id="resultado"></div>

</div>

</div>

<script>

const pacientes = [

{
dni:"30123456",
nombre:"Juan Perez",
fecha:"02/06/2026",
hora:"14:35",
sector:"Guardia"
},

{
dni:"28987654",
nombre:"Maria Gomez",
fecha:"02/06/2026",
hora:"10:20",
sector:"Guardia"
}

];

function buscar(){

const dni=document.getElementById("dni").value.trim();

const paciente=pacientes.find(
p=>p.dni===dni
);

if(paciente){

document.getElementById("resultado").innerHTML=`

<div class="ok">

<h2>✓ ASISTENCIA CONFIRMADA</h2>

<br>

<p><b>Paciente:</b> ${paciente.nombre}</p>

<p><b>DNI:</b> ${paciente.dni}</p>

<p><b>Fecha:</b> ${paciente.fecha}</p>

<p><b>Hora:</b> ${paciente.hora}</p>

<p><b>Sector:</b> ${paciente.sector}</p>

</div>

`;

}else{

document.getElementById("resultado").innerHTML=`

<div class="error">

<h2>✗ NO SE ENCONTRARON REGISTROS</h2>

</div>

`;

}

}

</script>

</body>
</html>
